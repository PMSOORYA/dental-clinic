<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 250" width="100%" height="100%">
        <!-- Background -->
        <rect width="100%" height="100%"  rx="16"/>
        <defs>
            <linearGradient id="serviceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#0B1C3F" />
                <stop offset="100%" stop-color="#1A2E5A" />
            </linearGradient>
        </defs>
        <rect width="100%" height="100%" fill="url(#serviceGrad)" rx="16"/>
        
        
            <!-- Smile outline with measuring crosshairs -->
            <path d="M50,110 Q100,170 150,110" stroke="#0B1C3F" stroke-width="5" fill="none" stroke-linecap="round"/>
            <path d="M45,110 Q100,70 155,110" stroke="#0B1C3F" stroke-width="2" fill="none" stroke-linecap="round"/>
            <!-- Teeth indicators -->
            <path d="M80,115 L80,135" stroke="#D4AF37" stroke-width="2" stroke-dasharray="3,3"/>
            <path d="M100,118 L100,140" stroke="#D4AF37" stroke-width="2" stroke-dasharray="3,3"/>
            <path d="M120,115 L120,135" stroke="#D4AF37" stroke-width="2" stroke-dasharray="3,3"/>
            <!-- Measuring curve (Gold) -->
            <path d="M40,135 Q100,195 160,135" stroke="#D4AF37" stroke-width="2" fill="none" stroke-dasharray="4,4"/>
            <!-- Ruler indicator -->
            <line x1="100" y1="70" x2="100" y2="170" stroke="#D4AF37" stroke-width="1.5" stroke-dasharray="3,3"/>
            <circle cx="100" cy="118" r="4" fill="#D4AF37"/>
        
        
        <!-- Text Label -->
        <text x="100" y="225" fill="#FFFFFF" font-family="'Plus Jakarta Sans', sans-serif" font-size="12" font-weight="bold" text-anchor="middle" letter-spacing="0.5">SMILE DESIGNING</text>
    </svg>