<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 250" width="100%" height="100%">
        <!-- Background -->
        <rect width="100%" height="100%"  rx="16"/>
        <defs>
            <linearGradient id="serviceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#0B1C3F" />
                <stop offset="100%" stop-color="#1A2E5A" />
            </linearGradient>
        </defs>
        <rect width="100%" height="100%" fill="url(#serviceGrad)" rx="16"/>
        
        
            <!-- Tooth Outline -->
            <path d="M70,80 C60,40 140,40 130,80 C125,100 135,130 120,160 C110,180 115,220 110,230 C105,220 105,170 95,160 C85,150 80,100 70,80 Z" fill="#EBF0F5" stroke="#0B1C3F" stroke-width="4"/>
            <!-- Root Canal (Gold) -->
            <path d="M100,85 L100,140 C100,160 108,180 108,215" stroke="#D4AF37" stroke-width="4" stroke-linecap="round" fill="none"/>
            <path d="M100,110 Q92,150 92,205" stroke="#D4AF37" stroke-width="3" stroke-linecap="round" fill="none"/>
            <!-- Microscope Lens (Gold/Navy) -->
            <circle cx="100" cy="50" r="15" fill="none" stroke="#D4AF37" stroke-width="3"/>
            <line x1="100" y1="65" x2="100" y2="75" stroke="#0B1C3F" stroke-width="4"/>
            <line x1="85" y1="50" x2="115" y2="50" stroke="#D4AF37" stroke-width="2"/>
        
        
        <!-- Text Label -->
        <text x="100" y="225" fill="#FFFFFF" font-family="'Plus Jakarta Sans', sans-serif" font-size="12" font-weight="bold" text-anchor="middle" letter-spacing="0.5">MICROSCOPIC ROOT CANAL</text>
    </svg>