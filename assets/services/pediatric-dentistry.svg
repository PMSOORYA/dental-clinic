<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 250" width="100%" height="100%">
        <!-- Background -->
        <rect width="100%" height="100%"  rx="16"/>
        <defs>
            <linearGradient id="serviceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#0B1C3F" />
                <stop offset="100%" stop-color="#1A2E5A" />
            </linearGradient>
        </defs>
        <rect width="100%" height="100%" fill="url(#serviceGrad)" rx="16"/>
        
        
            <!-- Cute smiling baby tooth -->
            <path d="M75,90 C68,60 132,60 125,90 C120,105 128,125 118,145 C113,155 116,175 112,185 C108,175 106,145 100,140 C94,145 92,175 88,185 C84,175 87,155 82,145 C72,125 80,105 75,90 Z" fill="#FFFFFF" stroke="#0B1C3F" stroke-width="4"/>
            <!-- Cute face details -->
            <circle cx="92" cy="100" r="3.5" fill="#0B1C3F"/>
            <circle cx="108" cy="100" r="3.5" fill="#0B1C3F"/>
            <!-- Rosy cheeks (Gold/Pinkish) -->
            <circle cx="86" cy="106" r="3" fill="#D4AF37" opacity="0.6"/>
            <circle cx="114" cy="106" r="3" fill="#D4AF37" opacity="0.6"/>
            <!-- Happy tongue smile -->
            <path d="M96,108 Q100,116 104,108 Z" fill="#0B1C3F"/>
            <!-- Floating balloons or bubbles -->
            <circle cx="135" cy="70" r="8" fill="none" stroke="#D4AF37" stroke-width="2"/>
            <path d="M135,78 Q133,88 138,93" stroke="#D4AF37" stroke-width="1.5" fill="none"/>
            <circle cx="60" cy="75" r="5" fill="none" stroke="#D4AF37" stroke-width="1.5"/>
        
        
        <!-- Text Label -->
        <text x="100" y="225" fill="#FFFFFF" font-family="'Plus Jakarta Sans', sans-serif" font-size="12" font-weight="bold" text-anchor="middle" letter-spacing="0.5">PEDIATRIC DENTISTRY</text>
    </svg>