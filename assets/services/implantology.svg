<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 250" width="100%" height="100%">
        <!-- Background -->
        <rect width="100%" height="100%"  rx="16"/>
        <defs>
            <linearGradient id="serviceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#0B1C3F" />
                <stop offset="100%" stop-color="#1A2E5A" />
            </linearGradient>
        </defs>
        <rect width="100%" height="100%" fill="url(#serviceGrad)" rx="16"/>
        
        
            <!-- Abutment and Screw -->
            <rect x="92" y="120" width="16" height="30" fill="#718096" stroke="#0B1C3F" stroke-width="3" rx="2"/>
            <!-- Screw threads -->
            <line x1="88" y1="130" x2="112" y2="130" stroke="#0B1C3F" stroke-width="3"/>
            <line x1="88" y1="140" x2="112" y2="140" stroke="#0B1C3F" stroke-width="3"/>
            <line x1="90" y1="150" x2="110" y2="150" stroke="#0B1C3F" stroke-width="3"/>
            <!-- Tapered end -->
            <path d="M92,150 L100,165 L108,150 Z" fill="#718096" stroke="#0B1C3F" stroke-width="3"/>
            <!-- Abutment connector (Gold) -->
            <path d="M85,100 L115,100 L108,120 L92,120 Z" fill="#D4AF37" stroke="#0B1C3F" stroke-width="3"/>
            <!-- Crown -->
            <path d="M75,98 C75,58 125,58 125,98 Z" fill="#FFFFFF" stroke="#0B1C3F" stroke-width="4"/>
            <!-- Sparkles -->
            <path d="M60,60 L63,65 L68,66 L63,67 L60,72 L57,67 L52,66 L57,65 Z" fill="#D4AF37"/>
        
        
        <!-- Text Label -->
        <text x="100" y="225" fill="#FFFFFF" font-family="'Plus Jakarta Sans', sans-serif" font-size="12" font-weight="bold" text-anchor="middle" letter-spacing="0.5">IMPLANTOLOGY</text>
    </svg>