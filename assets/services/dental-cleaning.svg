<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 250" width="100%" height="100%">
        <!-- Background -->
        <rect width="100%" height="100%"  rx="16"/>
        <defs>
            <linearGradient id="serviceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#0B1C3F" />
                <stop offset="100%" stop-color="#1A2E5A" />
            </linearGradient>
        </defs>
        <rect width="100%" height="100%" fill="url(#serviceGrad)" rx="16"/>
        
        
            <!-- Shiny Tooth -->
            <path d="M70,85 C60,45 140,45 130,85 C125,105 135,135 120,165 C110,185 115,225 110,235 C105,225 105,175 95,165 C85,155 80,105 70,85 Z" fill="#FFFFFF" stroke="#0B1C3F" stroke-width="4"/>
            <!-- Water/Spray Cleaning Tool (Gold/Blue) -->
            <path d="M40,65 L70,80" stroke="#718096" stroke-width="4" stroke-linecap="round"/>
            <!-- Water drops (Gold) -->
            <circle cx="78" cy="83" r="3.5" fill="#D4AF37"/>
            <circle cx="85" cy="90" r="2.5" fill="#D4AF37"/>
            <circle cx="73" cy="95" r="3" fill="#D4AF37"/>
            <!-- Shine bubbles -->
            <circle cx="130" cy="70" r="5" fill="none" stroke="#D4AF37" stroke-width="1.5"/>
            <circle cx="120" cy="62" r="2" fill="#D4AF37"/>
        
        
        <!-- Text Label -->
        <text x="100" y="225" fill="#FFFFFF" font-family="'Plus Jakarta Sans', sans-serif" font-size="12" font-weight="bold" text-anchor="middle" letter-spacing="0.5">DENTAL CLEANING</text>
    </svg>