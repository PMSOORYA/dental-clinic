<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 220" width="100%" height="100%">
        <defs>
            <clipPath id="clip">
                <rect width="360" height="220" rx="16"/>
            </clipPath>
        </defs>
        <g clip-path="url(#clip)">
            
            <!-- BEFORE (Left half, Crooked teeth) -->
            <g transform="translate(0, 0)">
                <rect x="0" y="0" width="180" height="220" fill="#0B1C3F"/>
                <!-- Tooth 1 Crooked -->
                <path d="M60,110 C50,85 80,85 70,110 C65,120 72,140 60,160 Z" fill="#EBF0F5" stroke="#718096" stroke-width="2" transform="rotate(-15, 65, 110)"/>
                <!-- Tooth 2 Crooked -->
                <path d="M100,105 C90,80 120,80 110,105 C105,115 112,135 100,155 Z" fill="#EBF0F5" stroke="#718096" stroke-width="2" transform="rotate(10, 105, 105)"/>
                <!-- Tooth 3 Crooked -->
                <path d="M140,110 C130,85 160,85 150,110 C145,120 152,140 140,160 Z" fill="#EBF0F5" stroke="#718096" stroke-width="2" transform="rotate(-5, 145, 110)"/>
                <!-- Red-ish gum backdrop -->
                <path d="M30,80 Q100,60 170,80" stroke="#C53030" stroke-width="8" fill="none" opacity="0.6"/>
                <text x="90" y="200" fill="#718096" font-family="'Plus Jakarta Sans', sans-serif" font-size="14" font-weight="bold" text-anchor="middle">BEFORE</text>
            </g>
            <!-- Divider Line (Gold) -->
            <line x1="180" y1="0" x2="180" y2="220" stroke="#D4AF37" stroke-width="3"/>
            <!-- AFTER (Right half, Perfect alignment) -->
            <g transform="translate(180, 0)">
                <rect x="0" y="0" width="180" height="220" fill="#0F224A"/>
                <!-- Perfect Straight Teeth -->
                <path d="M45,105 C38,80 62,80 55,105 C50,115 56,135 48,155 Z" fill="#FFFFFF" stroke="#0B1C3F" stroke-width="2"/>
                <path d="M90,102 C83,77 107,77 100,102 C95,112 101,132 93,152 Z" fill="#FFFFFF" stroke="#0B1C3F" stroke-width="2"/>
                <path d="M135,105 C128,80 152,80 145,105 C140,115 146,135 138,155 Z" fill="#FFFFFF" stroke="#0B1C3F" stroke-width="2"/>
                <!-- Gum backdrop -->
                <path d="M10,80 Q90,60 170,80" stroke="#D4AF37" stroke-width="8" fill="none" opacity="0.3"/>
                <!-- Sparkles -->
                <path d="M125,50 L128,55 L133,55 L129,59 L130,64 L125,60 L120,64 L121,59 L117,55 L122,55 Z" fill="#D4AF37"/>
                <text x="90" y="200" fill="#D4AF37" font-family="'Plus Jakarta Sans', sans-serif" font-size="14" font-weight="bold" text-anchor="middle">AFTER</text>
            </g>
        
        </g>
    </svg>