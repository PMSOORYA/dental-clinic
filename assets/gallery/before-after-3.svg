<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 220" width="100%" height="100%">
        <defs>
            <clipPath id="clip">
                <rect width="360" height="220" rx="16"/>
            </clipPath>
        </defs>
        <g clip-path="url(#clip)">
            
            <!-- BEFORE (Left half, Missing tooth gap) -->
            <g transform="translate(0, 0)">
                <rect x="0" y="0" width="180" height="220" fill="#0B1C3F"/>
                <!-- Two adjacent teeth but gap in middle -->
                <path d="M30,120 C25,95 55,95 48,120 C42,130 46,150 35,170 Z" fill="#FFFFFF" stroke="#718096" stroke-width="2"/>
                <!-- Blank Gap with warning dash -->
                <circle cx="90" cy="110" r="15" fill="none" stroke="#E53E3E" stroke-width="2" stroke-dasharray="4,4"/>
                <line x1="80" y1="110" x2="100" y2="110" stroke="#E53E3E" stroke-width="2"/>
                <path d="M150,120 C145,95 175,95 168,120 C162,130 166,150 155,170 Z" fill="#FFFFFF" stroke="#718096" stroke-width="2"/>
                <text x="90" y="200" fill="#718096" font-family="'Plus Jakarta Sans', sans-serif" font-size="14" font-weight="bold" text-anchor="middle">BEFORE</text>
            </g>
            <!-- Divider Line (Gold) -->
            <line x1="180" y1="0" x2="180" y2="220" stroke="#D4AF37" stroke-width="3"/>
            <!-- AFTER (Right half, Implant crown fitted) -->
            <g transform="translate(180, 0)">
                <rect x="0" y="0" width="180" height="220" fill="#0F224A"/>
                <!-- Three teeth, middle one is implant crown -->
                <path d="M30,120 C25,95 55,95 48,120 Z" fill="#EBF0F5" stroke="#0B1C3F" stroke-width="2"/>
                <!-- Perfect fitted implant crown with gold border -->
                <path d="M90,115 C83,90 107,90 100,115 C95,125 101,145 93,165 Z" fill="#FFFFFF" stroke="#D4AF37" stroke-width="3"/>
                <path d="M150,120 C145,95 175,95 168,120 Z" fill="#EBF0F5" stroke="#0B1C3F" stroke-width="2"/>
                <text x="90" y="200" fill="#D4AF37" font-family="'Plus Jakarta Sans', sans-serif" font-size="14" font-weight="bold" text-anchor="middle">AFTER</text>
            </g>
        
        </g>
    </svg>